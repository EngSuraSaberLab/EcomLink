{% load i18n %}
<style>
  .product.card:has(.js-added-indicator:not(.d-none)) .card-img-overlay {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }
</style>
<div id="product-card-{{ product.id }}" class="{{ col_class|default:'col-md-3' }}">
  <div class="product card mb-4">
    <img src="{% if product.image %}{{ product.image.url }}{% else %}https://placehold.co/300{% endif %}" class="card-img-top" alt="{{ product.name }}" />
    <div class="card-img-overlay d-flex flex-column align-items-center justify-content-center">
      {% if static_export %}
      <button type="button" class="btn btn-outline-light showcase-contact-trigger">{% trans "Add to Cart" %}</button>
      {% else %}
      <form method="post" action="{% url 'cart_add' product.slug %}" class="js-cart-add-form">
        {% csrf_token %}
        <input type="hidden" name="quantity" value="1" />
        <input type="hidden" name="next" value="{{ request.get_full_path }}" />
        <button type="submit" class="btn btn-outline-light">{% trans "Add to Cart" %}</button>
      </form>
      {% endif %}
      <a class="btn btn-outline-light mt-2" href="{% url 'product_detail' product.slug %}">{% trans "View" %}</a>
    </div>
    <div class="card-body">
      <h6 class="text-muted">{% if product.author %}{{ product.author.name }}{% else %}{% trans "No Author" %}{% endif %}</h6>
      <h6 class="card-title">{{ product.name }}</h6>
      <strong class="fw-bold text-success">{{ product.price }}$</strong>
      <div class="js-added-indicator text-white small mt-2 d-none bg-success px-2 py-1 rounded d-inline-block">{% trans "Added successfully" %}</div>
    </div>
  </div>
</div>
