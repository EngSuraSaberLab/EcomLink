{% load i18n %}
<div class="swiper main-slider my-auto">
  <div class="swiper-pagination"></div>
  <div class="swiper-wrapper">
    {% for slide in sliders %}
    <div class="swiper-slide">
      <div class="container pt-5">
        <div class="row">
          <div class="col-md-4 text-center d-none d-lg-block">
            <img src="{% if slide.image %}{{ slide.image.url }}{% else %}https://placehold.co/300{% endif %}" alt="{{ slide.title }}" class="img-fluid rounded" />
          </div>
          <div class="col-md-8">
            <h1 class="text-secondary">{{ slide.title }}</h1>
            <blockquote class="blockquote mt-4">
              <p class="text-muted">{{ slide.subtitle }}</p>
            </blockquote>
          </div>
        </div>
      </div>
    </div>
    {% empty %}
    <div class="swiper-slide">
      <div class="container pt-5">
        <div class="row">
          <div class="col-md-4 text-center d-none d-lg-block">
            <img src="https://placehold.co/300" alt="..." class="img-fluid rounded" />
          </div>
          <div class="col-md-8">
            <h1 class="text-secondary">{% trans "No slider items yet" %}</h1>
            <blockquote class="blockquote mt-4">
              <p class="text-muted">{% trans "Please add slider rows from admin panel." %}</p>
            </blockquote>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  <div class="swiper-scrollbar"></div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (typeof Swiper === "undefined") return;

    var sliderEl = document.querySelector(".main-slider");
    if (!sliderEl) return;

    if (sliderEl.swiper) {
      sliderEl.swiper.destroy(true, true);
    }

    new Swiper(sliderEl, {
      slidesPerView: 1,
      spaceBetween: 16,
      loop: true,
      grabCursor: true,
      scrollbar: {
        el: sliderEl.querySelector(".swiper-scrollbar"),
        draggable: true,
      },
      pagination: {
        el: sliderEl.querySelector(".swiper-pagination"),
        clickable: true,
      },
      breakpoints: {
        768: { slidesPerView: 2 },
        1200: { slidesPerView: 3 },
      },
    });
  });
</script>
