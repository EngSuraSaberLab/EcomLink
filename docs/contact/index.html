  <script>
    (function () {
      const forms = document.querySelectorAll(".js-cart-add-form");
      if (!forms.length) return;

      forms.forEach(function (form) {
        form.addEventListener("submit", async function (event) {
          event.preventDefault();

          const submitBtn = form.querySelector("button[type='submit']");
          if (submitBtn) submitBtn.disabled = true;

          try {
            const response = await fetch(form.action, {
              method: "POST",
              body: new FormData(form),
              headers: { "X-Requested-With": "XMLHttpRequest" },
              credentials: "same-origin",
            });
            if (!response.ok) throw new Error("Request failed");

            const payload = await response.json();
            if (!payload.ok) throw new Error("Invalid response");

            const cartCount = document.getElementById("cart-item-count");
            if (cartCount && typeof payload.cart_count !== "undefined") {
              cartCount.textContent = payload.cart_count;
            }

            const card = form.closest(".card");
            const indicator = card ? card.querySelector(".js-added-indicator") : null;
            if (indicator) {
              indicator.classList.remove("d-none");
              setTimeout(function () {
                indicator.classList.add("d-none");
              }, 1200);
            }
          } catch (error) {
            form.submit();
          } finally {
            if (submitBtn) submitBtn.disabled = false;
          }
        });
      });
    })();
  </script>

  <script>
    (function () {
      const root = document.body;
      if (!root || root.dataset.staticShowcaseMode !== "true") return;

      const modal = document.getElementById("showcase-contact-modal");
      const messageEl = document.getElementById("showcase-contact-message");
      const actionEl = document.getElementById("showcase-contact-action");
      if (!modal || !messageEl || !actionEl) return;

      const lang = document.documentElement.lang === "ar" ? "ar" : "en";
      const message = lang === "ar" ? root.dataset.staticShowcaseMessageAr : root.dataset.staticShowcaseMessageEn;
      const buttonLabel = lang === "ar" ? root.dataset.staticShowcaseButtonAr : root.dataset.staticShowcaseButtonEn;
      actionEl.href = root.dataset.staticShowcaseContactUrl || "#";
      messageEl.textContent = message || "";
      actionEl.textContent = buttonLabel || "";

      function openModal(event) {
        if (event) event.preventDefault();
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
      }

      document.querySelectorAll(".showcase-contact-trigger").forEach(function (node) {
        node.addEventListener("click", openModal);
      });

      modal.addEventListener("click", function (event) {
        if (event.target === modal || event.target.hasAttribute("data-showcase-close")) {
          closeModal();
        }
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") closeModal();
      });
    })();
  </script>
